name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: dev
        options:
          - dev
          - production
      production_release_approved:
        description: Confirm that the shared production release approval was recorded
        required: true
        type: boolean
        default: false
      security_review_approved:
        description: Confirm Roman approved the production security review
        required: true
        type: boolean
        default: false
      scanner_integration_approved:
        description: Confirm contract 1.1 scanner integration tests passed
        required: true
        type: boolean
        default: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Validate dev bundle
        run: npm exec wrangler -- deploy --env dev --dry-run

      - name: Validate production bundle
        run: npm exec wrangler -- deploy --env production --dry-run

  deploy-dev:
    needs: verify
    if: github.event_name == 'push' || inputs.target == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply dev D1 migrations
        run: npm exec wrangler -- d1 migrations apply market-signal-ai-bot-dev-db --env dev --remote

      - name: Deploy dev Worker
        run: npm exec wrangler -- deploy --env dev --message "dev ${GITHUB_SHA}"

      - name: Verify dev health
        run: node -e "const r=await fetch('https://market-signal-ai-bot-dev.fnemoy.workers.dev/api/health'); if(!r.ok) throw new Error('dev health '+r.status); const body=await r.json(); if(body.environment!=='dev') throw new Error('wrong environment'); console.log('dev health ok')"

  deploy-production:
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production' && inputs.production_release_approved == true && inputs.security_review_approved == true && inputs.scanner_integration_approved == true
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export production D1 backup
        run: npm exec wrangler -- d1 export market-signal-ai-bot-db --env production --remote --output production-before-migration.sql --skip-confirmation

      - name: Store production D1 backup
        uses: actions/upload-artifact@v4
        with:
          name: production-d1-before-${{ github.run_id }}
          path: production-before-migration.sql
          retention-days: 3
          if-no-files-found: error

      - name: Apply production D1 migrations
        run: npm exec wrangler -- d1 migrations apply market-signal-ai-bot-db --env production --remote

      - name: Deploy production Worker
        run: npm exec wrangler -- deploy --env production --message "production ${GITHUB_SHA}"

      - name: Verify production health
        run: node -e "const r=await fetch('https://market-signal-ai-bot.fnemoy.workers.dev/api/health'); if(!r.ok) throw new Error('production health '+r.status); const body=await r.json(); if(body.environment!=='production') throw new Error('wrong environment'); console.log('production health ok')"
